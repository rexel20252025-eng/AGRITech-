<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGRITech — Mes Retraits</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --g1: #0d5c2e;
  --g2: #1a8c4e;
  --g3: #25b96a;
  --gold: #e2b04a;
  --dark: #071a0f;
  --bg: #eef7f2;
  --card: #ffffff;
  --muted: #7a9688;
  --border: #d0e8da;
  --pending: #d4840a;
  --pending-bg: #fff8ec;
  --pending-border: #f0cc80;
  --success: #0d7a3c;
  --success-bg: #edfaf3;
  --success-border: #a8e6c0;
  --rejected: #b82020;
  --rejected-bg: #fff0f0;
  --rejected-border: #f0a8a8;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 56px;
  position: relative;
  overflow-x: hidden;
}

/* Atmospheric blobs */
body::before {
  content: '';
  position: fixed; top: -200px; left: -160px;
  width: 560px; height: 560px;
  background: radial-gradient(circle, rgba(26,140,78,.11) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; bottom: -140px; right: -120px;
  width: 480px; height: 480px;
  background: radial-gradient(circle, rgba(226,176,74,.09) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* LOADING */
#loadingOverlay {
  position: fixed; inset: 0;
  background: rgba(238,247,242,.96);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; backdrop-filter: blur(8px);
  transition: opacity .45s;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px;
  border: 2.5px solid var(--border);
  border-top-color: var(--g2);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: var(--muted); letter-spacing: .04em; }

/* LIST WRAPPER */
.withdraw-list {
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative; z-index: 1;
}

/* WITHDRAW CARD */
.wd-card {
  background: var(--card);
  border-radius: 22px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(13,92,46,.06), 0 8px 32px rgba(13,92,46,.04);
  overflow: hidden;
  animation: riseIn .5s cubic-bezier(.22,1,.36,1) both;
  transition: transform .22s, box-shadow .22s;
  position: relative;
}
.wd-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 24px rgba(13,92,46,.12), 0 16px 48px rgba(13,92,46,.07);
}
@keyframes riseIn {
  from { opacity: 0; transform: translateY(18px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Left accent stripe */
.wd-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 22px 0 0 22px;
}
.wd-card.status-pending::before  { background: var(--pending); }
.wd-card.status-success::before  { background: var(--success); }
.wd-card.status-rejected::before { background: var(--rejected); }

/* INNER */
.wd-inner {
  padding: 18px 20px 16px 22px;
  display: flex; flex-direction: column; gap: 14px;
}

/* TOP ROW */
.wd-row-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 12px;
}

.wd-amount-block {}
.wd-amount {
  font-family: 'Syne', sans-serif;
  font-size: 26px; font-weight: 800;
  color: var(--dark); letter-spacing: -.03em;
  line-height: 1;
}
.wd-net {
  font-size: 11.5px; color: var(--muted);
  margin-top: 5px; display: flex; align-items: center; gap: 5px;
}
.wd-net-val {
  color: var(--success); font-weight: 600;
  background: var(--success-bg);
  padding: 1px 7px; border-radius: 50px;
  border: 1px solid var(--success-border);
  font-size: 11px;
}

/* STATUS BADGE */
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 13px; border-radius: 50px;
  font-size: 11px; font-weight: 600;
  white-space: nowrap; flex-shrink: 0;
  letter-spacing: .02em;
}
.status-badge.pending  { background: var(--pending-bg);  color: var(--pending);  border: 1px solid var(--pending-border); }
.status-badge.success  { background: var(--success-bg);  color: var(--success);  border: 1px solid var(--success-border); }
.status-badge.rejected { background: var(--rejected-bg); color: var(--rejected); border: 1px solid var(--rejected-border); }

.status-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.pending  { background: var(--pending); animation: blink 1.4s ease-in-out infinite; }
.status-dot.success  { background: var(--success); }
.status-dot.rejected { background: var(--rejected); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* DIVIDER */
.wd-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
}

/* BOTTOM ROW */
.wd-row-bottom {
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
}

.wd-account { display: flex; align-items: center; gap: 11px; }

.wd-avatar {
  width: 38px; height: 38px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 800;
  color: white; flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(0,0,0,.15);
}

.wd-acc-name {
  font-size: 12.5px; font-weight: 600;
  color: var(--dark); line-height: 1.2;
}
.wd-acc-sub {
  display: flex; align-items: center; gap: 5px; margin-top: 3px;
}
.wd-acc-num {
  font-size: 11px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.op-chip {
  font-size: 9.5px; font-weight: 700;
  padding: 1px 7px; border-radius: 50px;
  color: white; letter-spacing: .03em;
}

.wd-meta { text-align: right; flex-shrink: 0; }
.wd-date { font-size: 10.5px; color: var(--muted); }
.wd-fee {
  font-size: 10.5px; color: var(--muted);
  margin-top: 3px;
}
.wd-fee-val {
  color: var(--dark); font-weight: 500;
}

/* EMPTY STATE */
.empty-state {
  width: 100%; max-width: 480px;
  text-align: center; padding: 56px 24px;
  background: var(--card); border-radius: 24px;
  border: 1.5px dashed var(--border);
  position: relative; z-index: 1;
  animation: riseIn .5s .1s cubic-bezier(.22,1,.36,1) both;
}
.empty-icon  { font-size: 44px; margin-bottom: 14px; }
.empty-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px; font-weight: 800;
  color: var(--dark); margin-bottom: 8px;
}
.empty-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--g1); color: white;
  padding: 12px 26px; border-radius: 50px;
  font-size: 12px; font-weight: 600;
  box-shadow: 0 8px 28px rgba(0,0,0,.18);
  transition: transform .35s cubic-bezier(.22,1,.36,1);
  z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Chargement de vos retraits…</div>
</div>

<div class="withdraw-list" id="withdrawList"></div>

<div class="toast" id="toast"></div>

<!-- ═══ FIREBASE ═══ -->
<script type="module">
import { initializeApp }               from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAnalytics }                from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getDatabase, ref, onValue }   from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaFEepJKO8TbePfgnYlX0N3-CcaV75fy4",
  authDomain: "agri-5af15.firebaseapp.com",
  databaseURL: "https://agri-5af15-default-rtdb.firebaseio.com",
  projectId: "agri-5af15",
  storageBucket: "agri-5af15.firebasestorage.app",
  messagingSenderId: "1010902928190",
  appId: "1:1010902928190:web:57d2555d69e2c023057a6f",
  measurementId: "G-XYB13DQZSP"
};

const app       = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth      = getAuth(app);
const db        = getDatabase(app);

const OP_GRAD = {
  MTN      : 'linear-gradient(135deg,#ffd600,#ff9800)',
  Moov     : 'linear-gradient(135deg,#1565c0,#42a5f5)',
  Orange   : 'linear-gradient(135deg,#e65100,#ff8f00)',
  Wave     : 'linear-gradient(135deg,#283593,#5c6bc0)',
  'T-Money': 'linear-gradient(135deg,#00695c,#26a69a)'
};

const STATUS_LABEL = {
  pending : '⏳ En cours',
  success : '✅ Validé',
  rejected: '❌ Refusé'
};

const fmt      = (n) => Math.round(n).toLocaleString('fr-FR') + ' FCFA';
const esc      = (s) => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const initials = (n) => String(n||'').trim().split(' ').slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');

const formatDate = (ts) => {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' })
    + ' · ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
};

const toast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
};

const render = (list) => {
  const container = document.getElementById('withdrawList');

  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💸</div>
        <div class="empty-title">Aucun retrait</div>
        <div class="empty-sub">Vous n'avez encore aucune demande de retrait.</div>
      </div>`;
    return;
  }

  container.innerHTML = list.map((w, idx) => {
    const st  = w.status || 'pending';
    const acc = w.account || {};
    const fee = w.fee || 0;
    const net = w.net || (w.amount - fee);
    return `
    <div class="wd-card status-${st}" style="animation-delay:${idx * 0.07}s">
      <div class="wd-inner">
        <div class="wd-row-top">
          <div class="wd-amount-block">
            <div class="wd-amount">${fmt(w.amount)}</div>
            <div class="wd-net">
              Vous recevez
              <span class="wd-net-val">${fmt(net)}</span>
            </div>
          </div>
          <div class="status-badge ${st}">
            <span class="status-dot ${st}"></span>
            ${STATUS_LABEL[st] || st}
          </div>
        </div>

        <div class="wd-divider"></div>

        <div class="wd-row-bottom">
          <div class="wd-account">
            <div class="wd-avatar" style="background:${OP_GRAD[acc.operator]||'linear-gradient(135deg,#4a5568,#718096)'}">${initials(acc.owner||'?')}</div>
            <div>
              <div class="wd-acc-name">${esc(acc.owner || '—')}</div>
              <div class="wd-acc-sub">
                ${acc.number ? `<span class="wd-acc-num">${esc(acc.number)}</span>` : ''}
                ${acc.operator ? `<span class="op-chip" style="background:${OP_GRAD[acc.operator]||'#555'}">${esc(acc.operator)}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="wd-meta">
            <div class="wd-date">${formatDate(w.createdAt)}</div>
            <div class="wd-fee">Frais : <span class="wd-fee-val">${fmt(fee)}</span></div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
};

onAuthStateChanged(auth, (user) => {
  if (!user) { window.location.href = 'index.html'; return; }

  onValue(ref(db, `withdrawals/${user.uid}`), (snap) => {
    let list = [];
    if (snap.exists()) {
      snap.forEach(s => {
        const val = s.val();
        if (val) list.push({ id: s.key, ...val });
      });
      list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    }

    render(list);

    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 450);
  });
});
</script>
</body>
</html>
